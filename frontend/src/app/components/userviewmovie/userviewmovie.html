<div class="max-w-6xl mx-auto px-6 py-10">

  <div class="mb-8">
    <h2 class="font-[family-name:var(--font-display)] text-2xl font-bold text-white">
      Now Showing
    </h2>
    <p class="text-gray-500 text-sm mt-1">Pick a movie and grab your seats</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    @for (movie of movies; track movie.movieId) {
      <div class="card overflow-hidden
                  hover:border-[color-mix(in_srgb,var(--color-gold-500)_30%,transparent)]
                  transition-all duration-300 group">

        <!-- Gold top accent bar -->
        <div class="h-1.5 bg-[color:var(--color-gold-500)]"></div>

        <div class="p-5">

          <!-- Genre badge -->
          <span class="badge">{{ movie.genre }}</span>

          <!-- Title -->
          <h3 class="font-semibold text-white text-base mt-3 mb-1 line-clamp-1">
            {{ movie.title }}
          </h3>

          <!-- Duration -->
          <div class="text-xs text-gray-500 mb-2">
            ⏱ {{ movie.duration }} min
          </div>

          <!-- Price + Book Now inline -->
          <div class="flex items-center justify-between
                      pt-3 mt-2 border-t border-gray-800">
            <span class="text-[color:var(--color-gold-400)] font-bold text-lg">
              ₹{{ movie.price }}
            </span>
            <button
              (click)="navigateToBooking(movie.movieId)"
              class="btn-gold text-xs px-4 py-2 rounded-lg">
              Book Now
            </button>
          </div>

        </div>
      </div>
    }
  </div>

  @if (movies.length === 0) {
    <div class="text-center py-24">
      <div class="text-5xl mb-3">🎭</div>
      <p class="text-gray-600">No movies available right now</p>
    </div>
  }

</div>
